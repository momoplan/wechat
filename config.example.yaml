server:
  bind_address: "0.0.0.0"
  management_port: 3141
  api_port: 3140

wechat:
  base_url: "https://ilinkai.weixin.qq.com"

runtime:
  event_retention_per_tenant: 200
  poll_retry_seconds: 3
  poll_timeout_seconds: 35
  max_inline_image_bytes: 5242880
  assistant_name: "小百"
  command_actions:
    - text: "新话题"
      action: "new"
    - text: "结束当前会话"
      action: "abort"
    - text: "命令列表"
      action: "list_commands"
    - text: "查询积分"
      action: "call"
      service: "crm-service"
      method: "getPoints"
      params:
        scene: "wechat"

database:
  url: "mysql://root:password@127.0.0.1:3306/wechat?charset=utf8mb4"
  max_connections: 20
  connect_timeout: 5
  idle_timeout: 60

lowcode_ws:
  base_url: "http://127.0.0.1:4012"
  forward_enabled: false

channel_gateway:
  inbound_token: ""

logging:
  level: "info"
  log_dir: "logs"
